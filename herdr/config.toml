onboarding = false

[ui.toast]
delivery = "system"

[keys]
prefix = "ctrl+q"
split_vertical = "cmd+\\"
split_horizontal = "cmd+shift+\\"
close_pane = "cmd+w"
close_tab = "prefix+x"
navigate_workspace_up = "k"
navigate_workspace_down = "j"

# pane の等分割（組み込みアクションが無いため socket API 経由）
[[keys.command]]
key = "cmd+shift+e"
type = "shell"
description = "equalize panes"
command = "python3 ~/.config/herdr/equalize-panes.py"

# worktree を branch ごと削除（組み込み remove_worktree は branch を残すため）
[[keys.command]]
key = "prefix+shift+x"
type = "popup"
width = 60
height = 8
description = "remove worktree + branch"
command = "python3 ~/.config/herdr/remove-worktree.py"

[theme]
name = "one-dark"
